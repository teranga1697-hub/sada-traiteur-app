version: '3.9'

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sada-traiteur

  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/sada-traiteur
      - JWT_SECRET=${JWT_SECRET:-supersecretjwt}
      - ADMIN_SECRET=${ADMIN_SECRET:-superadmin123}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - '80:80'
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:5000}

volumes:
  mongo-data:
    name: sada-traiteur-mongo
