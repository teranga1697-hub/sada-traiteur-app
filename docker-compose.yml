version: '3.9'

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - '27017:27017'

  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/sada-traiteur
      - JWT_SECRET=supersecretjwt
      - ADMIN_SECRET=superadmin123

  frontend:
    build:
      context: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - BACKEND_URL=http://backend:5000

volumes:
  mongo-data:
    name: sada-traiteur-mongo
